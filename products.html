<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製品紹介 - 有限会社 中澤鉄工所</title>
    <meta name="description" content="中澤鉄工所の製品紹介。産業機械部品、工作機械部品、油圧・空圧部品など、高精度・高品質な金属加工製品をご覧ください。">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/pages/products.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>
    <!-- ヘッダー -->
    <div id="header-placeholder"></div>

    <!-- メインコンテンツ -->
    <main class="main">
        <!-- ページヘッダー -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-header__title fade-in">製品紹介</h1>
            </div>
        </section>

        <!-- 製品紹介イントロ -->
        <section class="section">
            <div class="container">
                <div class="products-intro fade-in">
                    <h2 class="section__title text-center">製品ギャラリー</h2>
                    <p class="products-intro__text">
                        中澤鉄工所が手がけた製品をご覧ください
                    </p>
                </div>
            </div>
        </section>

        <!-- 製品ギャラリー -->
        <section class="section section--gray">
            <div class="container">
                <div class="mosaic-gallery">
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_precision_parts.jpg" alt="精密部品" loading="lazy">
                </div>
                <!-- 2x2サイズ（大） -->
                <div class="mosaic-item mosaic-item--large">
                    <img src="assets/images/products_complex_machined_parts.jpg" alt="複合加工品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_valve_body.jpg" alt="バルブボディ" loading="lazy">
                </div>
                <!-- 2x1サイズ（横長） -->
                <div class="mosaic-item mosaic-item--wide">
                    <img src="assets/images/products_irregular_shaped_parts.jpg" alt="異形状部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_actuator_parts.jpg" alt="アクチュエーター部品" loading="lazy">
                </div>
                <!-- 1x2サイズ（縦長） -->
                <div class="mosaic-item mosaic-item--tall">
                    <img src="assets/images/products_coupling_joint_parts.jpg" alt="継手部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_piston_parts.jpg" alt="ピストン部品" loading="lazy">

                <div class="mosaic-item">
                    <img src="assets/images/products_manifold_block.jpg" alt="マニホールドブロック" loading="lazy">

                <!-- 2x1サイズ（横長） -->
                <div class="mosaic-item mosaic-item--wide">
                    <img src="assets/images/products_cylinder_parts.jpg" alt="シリンダー部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_guide_parts.jpg" alt="ガイド部品" loading="lazy">
                </div>
                <!-- 2x2サイズ（大） -->
                <div class="mosaic-item mosaic-item--large">
                    <img src="assets/images/products_atc_parts.jpg" alt="ATC部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_tool_holder.jpg" alt="ツールホルダー" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_chuck_parts.jpg" alt="チャック部品" loading="lazy">
                </div>
                <!-- 1x2サイズ（縦長） -->
                <div class="mosaic-item mosaic-item--tall">
                    <img src="assets/images/products_feed_mechanism_parts.jpg" alt="送り装置部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_spindle_parts.jpg" alt="スピンドル部品" loading="lazy">
                </div>
                <!-- 2x1サイズ（横長） -->
                <div class="mosaic-item mosaic-item--wide">
                    <img src="assets/images/products_housing_parts.jpg" alt="ハウジング部品" loading="lazy">

                <div class="mosaic-item">
                    <img src="assets/images/products_coupling_parts.jpg" alt="カップリング部品" loading="lazy">

                    <img src="assets/images/products_bearing_parts.jpg" alt="軸受部品" loading="lazy">
                </div>

                <div class="mosaic-item">
                    <img src="assets/images/products_valve_parts.jpg" alt="バルブ部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_pump_parts.jpg" alt="ポンプ部品" loading="lazy">
                </div>
                <!-- 1x1サイズ -->
                <div class="mosaic-item">
                    <img src="assets/images/products_gearbox_parts.jpg" alt="減速機部品" loading="lazy">
                </div>
                </div>
            </div>
        </section>


        <!-- CTAセクション -->
        <section class="section cta">
            <div class="container">
                <div class="cta__content">
                    <h2 class="cta__title fade-in">製品に関するお問い合わせ</h2>
                    <p class="cta__text fade-in">
                        図面をお持ちの方、加工のご相談をご希望の方は<br>
                        お気軽にお問い合わせください。
                    </p>
                    <div class="cta__buttons fade-in">
                        <a href="contact.html" class="btn btn--primary btn--large">お問い合わせ</a>
                        <a href="facilities.html" class="btn btn--outline btn--large">設備紹介を見る</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript -->
    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/products.js"></script>

</html>
