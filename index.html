<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- プレビュー公開中は検索エンジンに載せない（本公開時に削除） -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- title / description は各ページの <Seo>（react-helmet）が出力する -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Shippori+Mincho:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- 関係者限定プレビュー用ゲートの最小スタイル -->
    <style>
      #nk-gate {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #0b1626; color: #f4f0e6;
        font-family: "IBM Plex Sans JP", system-ui, sans-serif;
        background-image:
          linear-gradient(rgba(244, 240, 230, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(244, 240, 230, 0.045) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      #nk-gate.hide { opacity: 0; visibility: hidden; transition: opacity .45s ease, visibility .45s ease; }
      #nk-gate .box { width: min(92vw, 430px); text-align: center; padding: 2.5rem 2rem; }
      #nk-gate .mark { color: #ff6400; font-size: 1.3rem; }
      #nk-gate .eyebrow {
        font-family: "IBM Plex Mono", monospace; font-size: .72rem; letter-spacing: .3em;
        text-transform: uppercase; color: #ff6400; margin: 1.2rem 0 .8rem;
      }
      #nk-gate h1 { font-family: "Shippori Mincho", serif; font-weight: 700; font-size: 1.5rem; margin: 0 0 .8rem; }
      #nk-gate .lead { font-size: .9rem; line-height: 1.8; color: rgba(244, 240, 230, .72); margin: 0 0 1.6rem; }
      #nk-gate form { display: flex; gap: .5rem; }
      #nk-gate input {
        flex: 1; font-family: inherit; font-size: 1rem; color: #1a1d24; background: #f4f0e6;
        border: 1px solid rgba(244, 240, 230, .2); border-radius: 4px; padding: .8rem 1rem; outline: none;
      }
      #nk-gate input:focus { box-shadow: 0 0 0 3px rgba(255, 100, 0, .35); }
      #nk-gate button {
        font-family: inherit; font-weight: 700; color: #fff; background: #ff6400;
        border: none; border-radius: 4px; padding: .8rem 1.4rem; cursor: pointer; transition: background .2s;
      }
      #nk-gate button:hover { background: #e25800; }
      #nk-gate .err { color: #ff8a5c; font-size: .82rem; margin: 1rem 0 0; }
      #nk-gate[hidden] { display: none; }
    </style>
  </head>
  <body>
    <!-- ▼ 関係者限定プレビュー・ゲート（クライアント側のソフトな目隠し。詳細: docs/PREVIEW_GATE.md） -->
    <div id="nk-gate" hidden>
      <div class="box">
        <div class="mark" aria-hidden>◆</div>
        <p class="eyebrow">Private Preview</p>
        <h1>関係者限定プレビュー</h1>
        <p class="lead">このサイトは公開準備中です。<br />パスワードを入力してください。</p>
        <form id="nk-gate-form">
          <input id="nk-gate-input" type="password" autocomplete="off" placeholder="パスワード" aria-label="パスワード" />
          <button type="submit">入る</button>
        </form>
        <p id="nk-gate-err" class="err" hidden>パスワードが違います。</p>
      </div>
    </div>
    <script>
      (function () {
        var KEY = 'nk_preview_unlocked';
        // パスワードの SHA-256（既定: nakazawa2026）。変更方法は docs/PREVIEW_GATE.md 参照
        var HASH = 'a1cf2c25f15b18ca18124f6a31fe51935b1e203a20ead23baa0e7e9c7de9b70d';
        var gate = document.getElementById('nk-gate');
        var params = new URLSearchParams(location.search);
        var forced = params.has('lock');
        var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        try {
          if (!forced && (sessionStorage.getItem(KEY) === '1' || isLocal)) { gate.remove(); return; }
        } catch (e) {}
        function show() {
          document.documentElement.style.overflow = 'hidden';
          gate.hidden = false;
          var i = document.getElementById('nk-gate-input');
          if (i) setTimeout(function () { i.focus(); }, 60);
        }
        function unlock() {
          try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
          gate.classList.add('hide');
          document.documentElement.style.overflow = '';
          setTimeout(function () { gate.remove(); }, 480);
        }
        async function sha256(str) {
          var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
          return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
        }
        show();
        document.getElementById('nk-gate-form').addEventListener('submit', async function (e) {
          e.preventDefault();
          var err = document.getElementById('nk-gate-err');
          var input = document.getElementById('nk-gate-input');
          try {
            var h = await sha256(input.value);
            if (h === HASH) { unlock(); }
            else { err.hidden = false; input.value = ''; input.focus(); }
          } catch (ex) { err.hidden = false; }
        });
      })();
    </script>
    <!-- ▲ ゲートここまで -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
